name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: DeterminateSystems/flake-checker-action@main
      - name: Check formatting
        run: nix fmt -- --fail-on-change .
      - name: Run linters
        run: nix build .#checks.x86_64-linux.git-hooks --no-link

  nixos:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      id-token: "write"
      contents: "read"
    strategy:
      fail-fast: false
      matrix:
        host: [asuka, reina, kumiko]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: cachix/cachix-action@v16
        with:
          name: giuxtaposition
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build NixOS ${{ matrix.host }}
        run: nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --no-link

  home-manager:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      id-token: "write"
      contents: "read"
    strategy:
      fail-fast: false
      matrix:
        config: ["giu@asuka", "giu@reina"]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: cachix/cachix-action@v16
        with:
          name: giuxtaposition
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build home-manager ${{ matrix.config }}
        run: nix build .#homeConfigurations.\"${{ matrix.config }}\".activationPackage --no-link
