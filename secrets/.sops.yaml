# sops-nix creation rules for age encryption
#
# Replace age1_REPLACE_WITH_KUMIKO_PUBLIC_KEY with the public key from:
#   age-keygen -o /var/lib/sops-nix/key.txt
# (the public key is printed to stderr)

keys:
  - &kumiko age1_REPLACE_WITH_KUMIKO_PUBLIC_KEY

creation_rules:
  - path_regex: secrets\.yaml$
    key_groups:
      - age:
          - *kumiko
